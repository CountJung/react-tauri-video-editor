name: Build & Release

# ─── 트리거 ───────────────────────────────────────────────────
# 버전 태그(v*.*.*) 푸시 또는 수동 실행
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # GitHub Release 생성·업로드에 필요

# ─── 공통 환경 설정 ───────────────────────────────────────────
env:
  PNPM_VERSION: '10.30.3'
  NODE_VERSION: '22'

# ═══════════════════════════════════════════════════════════════
# JOB 1 — Windows (NSIS + MSI 설치 파일)
# ═══════════════════════════════════════════════════════════════
jobs:
  build-windows:
    name: Windows Build (NSIS + MSI)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js + pnpm ──
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # ── Rust ──
      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      # ── 의존성 설치 ──
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── FFmpeg sidecar 다운로드 ──
      - name: Download FFmpeg sidecar binaries
        run: pnpm install-ffmpeg

      # ── .env 주입 (GitHub Secret → 프로젝트 루트 .env) ──
      # Secret 'APP_ENV'에 .env 파일 전체 내용을 저장하세요.
      - name: Create .env
        shell: bash
        run: printf '%s' "$APP_ENV" > .env
        env:
          APP_ENV: ${{ secrets.APP_ENV }}

      # ── 서명 환경 변수 설정 (선택) ──
      # TAURI_SIGNING_PRIVATE_KEY Secret이 설정된 경우에만 주입
      - name: Prepare signing env (Windows)
        shell: bash
        run: |
          if [ -n "$SIGN_KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY=$SIGN_KEY" >> "$GITHUB_ENV"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$SIGN_PASS" >> "$GITHUB_ENV"
          fi
        env:
          SIGN_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          SIGN_PASS: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ── Tauri 빌드 ──
      - name: Build Tauri app (Windows)
        run: pnpm build

      # ── 아티팩트 수집 ──
      # Tauri NSIS: src-tauri/target/release/bundle/nsis/*.exe
      # Tauri MSI:  src-tauri/target/release/bundle/msi/*.msi
      - name: Collect Windows artifacts
        shell: bash
        run: |
          mkdir -p dist/windows
          NSIS=$(find src-tauri/target/release/bundle/nsis -name "*.exe" 2>/dev/null | sort | tail -1)
          if [ -n "$NSIS" ]; then
            cp "$NSIS" dist/windows/
            echo "NSIS: $NSIS"
          fi
          MSI=$(find src-tauri/target/release/bundle/msi -name "*.msi" 2>/dev/null | sort | tail -1)
          if [ -n "$MSI" ]; then
            cp "$MSI" dist/windows/
            echo "MSI: $MSI"
          fi
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version" 2>/dev/null || echo "unknown")
          echo "{\"version\":\"$VERSION\"}" > dist/windows/version.json
          ls -lh dist/windows/

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/windows/
          if-no-files-found: error

# ═══════════════════════════════════════════════════════════════
# JOB 2 — macOS Apple Silicon (DMG)
# ═══════════════════════════════════════════════════════════════
  build-macos-arm64:
    name: macOS Build (Apple Silicon DMG)
    runs-on: macos-14   # M1 runner (aarch64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js + pnpm ──
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # ── Rust ──
      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      # ── 의존성 설치 ──
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── FFmpeg sidecar 다운로드 (macOS aarch64) ──
      - name: Download FFmpeg sidecar binaries
        run: pnpm install-ffmpeg

      # ── .env 주입 ──
      - name: Create .env
        run: printf '%s' "$APP_ENV" > .env
        env:
          APP_ENV: ${{ secrets.APP_ENV }}

      # ── 서명 환경 변수 설정 (선택) ──
      # Apple Developer 계정이 있다면 아래 Secret 들을 설정하세요:
      #   TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD
      #   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
      #   APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
      - name: Prepare signing env (macOS arm64)
        shell: bash
        run: |
          if [ -n "$SIGN_KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY=$SIGN_KEY" >> "$GITHUB_ENV"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$SIGN_PASS" >> "$GITHUB_ENV"
          fi
          if [ -n "$APPLE_CERT" ]; then
            echo "APPLE_CERTIFICATE=$APPLE_CERT" >> "$GITHUB_ENV"
            echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERT_PASS" >> "$GITHUB_ENV"
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGN_ID" >> "$GITHUB_ENV"
            echo "APPLE_ID=$_APPLE_ID" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=$APPLE_PASS" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$APPLE_TID" >> "$GITHUB_ENV"
          fi
        env:
          SIGN_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          SIGN_PASS: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERT_PASS: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGN_ID: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          _APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASS: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TID: ${{ secrets.APPLE_TEAM_ID }}

      # ── Tauri 빌드 ──
      - name: Build Tauri app (macOS arm64)
        run: pnpm build

      # ── 아티팩트 수집 ──
      - name: Collect macOS arm64 artifacts
        run: |
          mkdir -p dist/macos-arm64
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | sort | tail -1)
          if [ -z "$DMG" ]; then
            echo "::error::DMG 파일을 찾을 수 없습니다"
            exit 1
          fi
          cp "$DMG" dist/macos-arm64/
          echo "DMG: $DMG"
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version" 2>/dev/null || echo "unknown")
          echo "{\"version\":\"$VERSION\"}" > dist/macos-arm64/version.json
          ls -lh dist/macos-arm64/

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-installer
          path: dist/macos-arm64/
          if-no-files-found: error

# ═══════════════════════════════════════════════════════════════
# JOB 3 — macOS Intel (DMG)
# macos-13 runner = Intel x86_64
# ═══════════════════════════════════════════════════════════════
  build-macos-x86_64:
    name: macOS Build (Intel DMG)
    runs-on: macos-13   # Intel runner (x86_64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-on-failure: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download FFmpeg sidecar binaries
        run: pnpm install-ffmpeg

      - name: Create .env
        run: printf '%s' "$APP_ENV" > .env
        env:
          APP_ENV: ${{ secrets.APP_ENV }}

      - name: Prepare signing env (macOS Intel)
        shell: bash
        run: |
          if [ -n "$SIGN_KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY=$SIGN_KEY" >> "$GITHUB_ENV"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$SIGN_PASS" >> "$GITHUB_ENV"
          fi
          if [ -n "$APPLE_CERT" ]; then
            echo "APPLE_CERTIFICATE=$APPLE_CERT" >> "$GITHUB_ENV"
            echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERT_PASS" >> "$GITHUB_ENV"
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGN_ID" >> "$GITHUB_ENV"
            echo "APPLE_ID=$_APPLE_ID" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=$APPLE_PASS" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$APPLE_TID" >> "$GITHUB_ENV"
          fi
        env:
          SIGN_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          SIGN_PASS: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERT_PASS: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGN_ID: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          _APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASS: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build Tauri app (macOS x86_64)
        run: pnpm build

      - name: Collect macOS Intel artifacts
        run: |
          mkdir -p dist/macos-x64
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | sort | tail -1)
          if [ -z "$DMG" ]; then
            echo "::error::DMG 파일을 찾을 수 없습니다"
            exit 1
          fi
          cp "$DMG" dist/macos-x64/
          echo "DMG: $DMG"
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version" 2>/dev/null || echo "unknown")
          echo "{\"version\":\"$VERSION\"}" > dist/macos-x64/version.json
          ls -lh dist/macos-x64/

      - name: Upload macOS Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-installer
          path: dist/macos-x64/
          if-no-files-found: error

# ═══════════════════════════════════════════════════════════════
# JOB 4 — GitHub Release 생성 & 파일 첨부
# ═══════════════════════════════════════════════════════════════
  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos-arm64, build-macos-x86_64]
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag name
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v-manual-$(date +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/windows

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-installer
          path: dist/macos-arm64

      - name: Download macOS Intel artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-x64-installer
          path: dist/macos-x64

      - name: Show collected files
        run: find dist/ -type f | sort

      - name: Read version
        id: ver
        run: |
          VERSION=$(jq -r '.version' dist/windows/version.json 2>/dev/null || echo "unknown")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Video Editor ${{ steps.tag.outputs.tag }}"
          body: |
            ## Video Editor ${{ steps.tag.outputs.tag }}

            앱 버전: `${{ steps.ver.outputs.version }}`

            ### 다운로드
            | 플랫폼 | 파일 |
            |--------|------|
            | Windows (NSIS 설치파일) | `*_x64-setup.exe` |
            | Windows (MSI) | `*_x64_en-US.msi` |
            | macOS Apple Silicon (M1/M2/M3) | `*_aarch64.dmg` |
            | macOS Intel (x86_64) | `*_x64.dmg` |

            > **macOS 첫 실행 시**: Gatekeeper 경고가 뜨면 시스템 환경설정 → 개인 정보 보호 및 보안에서 허용하세요.
          draft: false
          prerelease: false
          files: |
            dist/windows/*.exe
            dist/windows/*.msi
            dist/macos-arm64/*.dmg
            dist/macos-x64/*.dmg
          fail_on_unmatched_files: false
